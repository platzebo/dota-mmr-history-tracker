name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, e.g. v0.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Run tests
        run: go test ./...

  release:
    name: release assets
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
      - name: Resolve release tag
        id: vars
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.tag }}"
          fi
          if [ -z "$tag" ]; then
            echo "release tag is required" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          build() {
            local goos="$1"
            local goarch="$2"
            local ext="$3"
            local out="dist/dota-mmr-history-tracker-${goos}-${goarch}${ext}"
            echo "building $out"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -trimpath -ldflags='-s -w' \
              -o "$out" \
              ./cmd/dota-mmr-history-tracker
          }
          build linux amd64 ''
          build linux arm64 ''
          build windows amd64 '.exe'
          sha256sum dist/* > dist/SHA256SUMS.txt
      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ steps.vars.outputs.tag }}
          path: dist/*
          if-no-files-found: error
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/dota-mmr-history-tracker-linux-amd64
            dist/dota-mmr-history-tracker-linux-arm64
            dist/dota-mmr-history-tracker-windows-amd64.exe
            dist/SHA256SUMS.txt
